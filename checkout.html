
<!DOCTYPE html>
<html lang="id">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran | LokaLensa Kids</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Nunito', 'sans-serif'],
                        feather: ['"Feather Bold"', 'sans-serif'],
                    },
                    colors: {
                        'loka-green-forest': '#2F4F37',
                        'loka-orange-rust': '#DE5131',
                        'loka-green-mint': '#A7D9A0',
                        'loka-green-light': '#DDF4DD',
                        'loka-orange-peach': '#FFB74D',
                        'loka-yellow-sun': '#FFD54F',
                        'loka-text': '#2F4F37',
                        'loka-bg-warm': '#FFFBF0',
                        'loka-border': '#1C3222',
                    }
                }
            }
        };
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
</head>
<body class="font-sans text-loka-text bg-loka-bg-warm">
    
    <nav id="navbar" class="fixed top-0 w-full z-50 bg-white border-b-4 border-loka-orange-peach/30 py-2 shadow-md">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3 cursor-pointer">
                <i class="fa-solid fa-camera-retro text-2xl text-loka-orange-rust"></i>
                <span class="text-xl font-feather lowercase tracking-tight text-loka-green-forest mt-1">LokaLensa <span class="text-loka-orange-rust">Kids</span></span>
            </a>
            <a href="index.html" class="bg-loka-green-light text-loka-green-forest px-5 py-2 rounded-xl font-black uppercase text-xs tracking-widest border-2 border-loka-green-mint hover:bg-loka-green-mint transition-colors">
                Kembali
            </a>
        </div>
    </nav>

    
    <main class="pt-32 pb-24 px-6">
        <div class="max-w-xl mx-auto bg-white rounded-[2.5rem] border-4 border-loka-border p-8 md:p-12 shadow-[8px_8px_0_#1C3222]">
            <div class="text-center mb-10">
                <h1 class="text-4xl font-feather lowercase text-loka-green-forest mb-4">siap berpetualang?</h1>
                <p class="font-bold text-gray-500">Isi data di bawah ini untuk mendaftar kelas. Tombol akan langsung menghubungkan Anda ke WhatsApp Admin.</p>
            </div>
            
            <form id="waForm" class="space-y-6">
                <div>
                    <label class="block font-black text-sm uppercase tracking-widest text-loka-green-forest mb-2">Nama Orang Tua</label>
                    <input type="text" id="parentName" required placeholder="Contoh: Mama Nisa" class="w-full px-5 py-4 rounded-2xl border-4 border-gray-100 focus:border-loka-orange-peach outline-none font-bold transition-colors">
                </div>
                <div>
                    <label class="block font-black text-sm uppercase tracking-widest text-loka-green-forest mb-2">Nama Lengkap Anak</label>
                    <input type="text" id="childName" required placeholder="Contoh: Dito Pratama" class="w-full px-5 py-4 rounded-2xl border-4 border-gray-100 focus:border-loka-green-mint outline-none font-bold transition-colors">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block font-black text-sm uppercase tracking-widest text-loka-green-forest mb-2">Usia Anak</label>
                        <input type="number" id="childAge" required placeholder="Th" class="w-full px-5 py-4 rounded-2xl border-4 border-gray-100 focus:border-loka-yellow-sun outline-none font-bold transition-colors">
                    </div>
                    <div>
                        <label class="block font-black text-sm uppercase tracking-widest text-loka-green-forest mb-2">Paket Pilihan</label>
                        <select id="package" class="w-full px-5 py-4 rounded-2xl border-4 border-gray-100 focus:border-loka-orange-rust outline-none font-bold transition-colors appearance-none">
                            <option value="Petualang (Rp 99rb)">Petualang (1 Bln)</option>
                            <option value="Semester (Rp 499rb)">Semester (6 Bln)</option>
                            <option value="Master (Rp 899rb)">Master (1 Tahun)</option>
                            <option value="Coba-Coba (Gratis)">Coba-Coba (Gratis)</option>
                        </select>
                    </div>
                </div>
                
                <button type="submit" class="w-full bg-loka-orange-rust text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-[0_6px_0_#A83B22] text-lg hover:translate-y-1 hover:shadow-[0_2px_0_#A83B22] transition-all border-4 border-loka-border flex items-center justify-center gap-3">
                    <i class="fa-brands fa-whatsapp text-2xl"></i> Daftar via WhatsApp
                </button>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('waForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const pName = document.getElementById('parentName').value;
            const cName = document.getElementById('childName').value;
            const cAge = document.getElementById('childAge').value;
            const pkg = document.getElementById('package').value;
            
            const message = `Halo LokaLensa Kids! Saya ingin mendaftarkan anak saya.\n\n*Detail Pendaftaran:*\nNama Orang Tua: ${pName}\nNama Anak: ${cName}\nUsia: ${cAge} tahun\nPaket: ${pkg}\n\nMohon info langkah pembayarannya ya Kak!`;
            
            const waUrl = `https://wa.me/6283835161696?text=${encodeURIComponent(message)}`;
            window.open(waUrl, '_blank');
        });
    </script>
</body>
</html>
